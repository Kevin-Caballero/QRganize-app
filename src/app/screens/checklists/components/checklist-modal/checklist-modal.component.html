<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="medium" (click)="dismiss()"> CANCEL </ion-button>
    </ion-buttons>
    <ion-title class="app-text-h1">{{ isEditMode ? 'Edit Checklist' : 'New Checklist' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        class="app-primary-action"
        (click)="save()"
        [disabled]="!title?.trim() || loading"
        [strong]="true"
      >
        SAVE
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="container">
    <div class="checklist-form">
      <h3 class="app-text-h2">{{ isEditMode ? 'Edit' : 'Create a' }} <b>Checklist</b></h3>

      <!-- Checklist Title -->
      <ion-item>
        <ion-input
          labelPlacement="stacked"
          label="Title"
          [(ngModel)]="title"
          placeholder="Bedroom stuff"
          required
        >
          <ion-icon slot="start" name="create-outline"></ion-icon>
        </ion-input>
      </ion-item>
      <ion-note
        [class.ion-hide]="title?.trim()"
        color="danger"
      >
        Please enter a checklist title
      </ion-note>

      <!-- Checklist Description -->
      <ion-item>
        <ion-textarea
          labelPlacement="stacked"
          label="Description (optional)"
          [(ngModel)]="description"
          placeholder="What is this checklist for?"
          autoGrow="true"
        >
        </ion-textarea>
      </ion-item>

      <!-- Box Assignment -->
      <ion-item>
        <ion-select
          labelPlacement="stacked"
          label="Assign to box (optional)"
          [(ngModel)]="boxId"
          placeholder="No box"
          interface="popover"
        >
          <ion-select-option [value]="null" class="app-text-body">No box</ion-select-option>
          <ion-select-option *ngFor="let box of boxes" [value]="box.id" class="app-text-body">
            {{ box.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>
    </div>
  </div>
</ion-content>
