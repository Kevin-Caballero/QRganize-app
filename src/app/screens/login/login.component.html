<ion-content [fullscreen]="true" class="app-page">
  <div class="container">
    <div class="logo-container">
      <img
        src="assets/qrganize_icon.png"
        alt="QRganize Logo"
        class="logo-image"
      />
    </div>
    <div class="top">
      <h2 class="title app-text-h1">Login Now</h2>
      <p class="subtitle app-text-body">Please login to continue using the app.</p>
    </div>

    <div class="social-login">
      <ion-button
        expand="block"
        class="google app-primary-action"
        [disabled]="isSubmitting"
        (click)="loginWithGoogle()"
      >
        <ion-icon slot="start" name="logo-google"></ion-icon>
        Continue with Google
      </ion-button>
    </div>
    <p class="or-login-with-email app-text-caption">Or sign in with email</p>

    <div class="login-form">
      <form [formGroup]="loginForm">
        <ion-item>
          <ion-input
            labelPlacement="stacked"
            label="Email"
            formControlName="email"
            placeholder="john_doe&#64;gmail.com"
          >
            <ion-icon slot="start" name="mail"></ion-icon>
          </ion-input>
        </ion-item>
        <ion-note
          class="app-text-caption"
          [class.error-note--hidden]="
            !(loginForm.get('email')?.invalid && loginForm.get('email')?.touched)
          "
          color="danger"
        >
          Email is required and must be valid.
        </ion-note>

        <ion-item>
          <ion-input
            labelPlacement="stacked"
            label="Password"
            formControlName="password"
            placeholder="* * * * * * * *"
            [type]="passInputType"
          >
            <ion-icon slot="start" name="lock-closed"></ion-icon>
            <ion-button
              fill="clear"
              slot="end"
              aria-label="Show/hide"
              (click)="changePassVisibility()"
            >
              <ion-icon slot="icon-only" name="eye"></ion-icon>
            </ion-button>
          </ion-input>
        </ion-item>
        <ion-note
          class="app-text-caption"
          [class.error-note--hidden]="
            !(loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched)
          "
          color="danger"
        >
          Password is required.
        </ion-note>

        <div class="remember-me">
          <ion-button
            fill="clear"
            class="forgot-password-btn"
            (click)="forgotPassword()"
            >Forgot password?</ion-button
          >
        </div>
      </form>
    </div>

    <div class="bottom">
      <ion-button
        class="login app-primary-action"
        [disabled]="loginForm.invalid || isSubmitting"
        (click)="login()"
        >Sign in with email</ion-button
      >
      <p class="app-text-body">
        Don't have an account?
        <a class="secondary-link" (click)="navigateToRegister()">Signup</a>
      </p>
    </div>
  </div>
</ion-content>
